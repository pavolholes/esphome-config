substitutions:
  device_name: schody-svetlo
  friendly_name: Schody Svetlo
  room: Schody
  project_name: pavolholes.${friendly_name}
  project_version: "0.8"
  device_type: ESP32 WROOM
  pwm_pin: GPIO17
  pwm_pin2: GPIO18
  button_pin: GPIO14
  button_pullup: INPUT_PULLUP
  button_inverted: "True"
  light_nightBrightnessLevel: "0.01"
  light_eveningBrightnessLevel: "0.20"
  light_fadingStep: "0.05"

# TODO: Boot blinking issue - lights briefly flash on power-on during ESP32 boot
# Software solutions attempted (none worked):
#   - v0.4: on_boot automation with priority 600 (light.turn_off)
#   - v0.5: on_boot automation with priority -200 (earlier execution)
#   - v0.6: frequency: 300Hz on PWM outputs
#   - v0.7: output.turn_off instead of light.turn_off in on_boot
#   - v0.8: inverted: true on PWM output pins
# Root cause: GPIO pins (GPIO17, GPIO18) are in floating state during ESP32 boot before ESPHome firmware starts
# Hardware solutions (requires physical modification):
#   1. Add 10kΩ pull-down resistors from GPIO17 and GPIO18 to GND
#   2. Change to GPIO pins with better boot behavior (e.g., GPIO2, GPIO4, GPIO5)
# Note: Brief blink on boot is a hardware limitation, cannot be fixed with software configuration

# CHANGES
# v0.8 Pavol Holes 2026-04-28
#   - [output > ledc] added inverted: true to both PWM output pins
#     Inverts signal so default HIGH (on) becomes LOW (off) during boot to prevent blinking
# v0.7 Pavol Holes 2026-04-28
#   - [esphome > on_boot] changed from light.turn_off to output.turn_off to directly control PWM output level
#     May help prevent boot blinking by setting output level before light component initialization
# v0.6 Pavol Holes 2026-04-28
#   - [output > ledc] added frequency: 300Hz to both PWM outputs (standard in other LED configs)
#     May help stabilize PWM signal during boot to prevent blinking
# v0.5 Pavol Holes 2026-04-28
#   - [esphome > on_boot] changed on_boot priority from 600 to -200 to run earlier during boot
#     Simplified esphome override to only include on_boot section
# v0.4 Pavol Holes 2026-04-28
#   - [esphome > on_boot] added on_boot automation with priority 600 to prevent lights from blinking during boot
#     Overrides esphome section from common.yaml to include on_boot that turns off both lights immediately after ESP boot

packages:
  # higher in the list is higher priority (can overwrite values from includes below)
  common: !include pavolholes_common/common.yaml
  esp32: !include pavolholes_common/esp32.yaml
  # debug: !include pavolholes_common/debug.yaml
  # web_server: !include pavolholes_common/web_server.yaml # if ESP32 Bluetooth is used this needs to be disabled
  esp32BluetoothProxy: !include pavolholes_common/esp32BluetoothProxy.yaml # including this changes the framework so the first time it have to be loaded to ESP using USB cable, not OTA!
  gpio_button: !include pavolholes_common/binary_sensor/gpio_button.yaml

# Override esphome section from common.yaml to add on_boot
esphome:
  on_boot:
    - priority: -200
      then:
        - output.turn_off: output_pwm
        - output.turn_off: output_pwm2

output:
  - platform: ledc
    id: output_pwm
    pin:
      number: ${pwm_pin}
      inverted: true
    frequency: 300Hz

  - platform: ledc
    id: output_pwm2
    pin:
      number: ${pwm_pin2}
      inverted: true
    frequency: 300Hz

light:
  - platform: monochromatic
    name: "${friendly_name} Hlavne"
    icon: mdi:lightbulb
    id: light_pwm
    output: output_pwm
    restore_mode: ALWAYS_OFF #RESTORE_DEFAULT_OFF
    gamma_correct: 1.0 # to start brightness at 0.01 not at 0.18

  - platform: monochromatic
    name: "${friendly_name} LED"
    icon: mdi:led-strip-variant
    id: light_pwm2
    output: output_pwm2
    restore_mode: ALWAYS_OFF #RESTORE_DEFAULT_OFF
    gamma_correct: 1.0 # to start brightness at 0.01 not at 0.18

