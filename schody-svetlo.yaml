substitutions:
  device_name: schody-svetlo
  friendly_name: Schody Svetlo
  room: Schody
  project_name: pavolholes.${friendly_name}
  project_version: "0.4"
  device_type: ESP32 WROOM
  pwm_pin: GPIO17
  pwm_pin2: GPIO18
  button_pin: GPIO14
  button_pullup: INPUT_PULLUP
  button_inverted: "True"
  light_nightBrightnessLevel: "0.01"
  light_eveningBrightnessLevel: "0.20"
  light_fadingStep: "0.05"

# CHANGES
# v0.4 Pavol Holes 2026-04-28
#   - [light > on_boot] added on_boot automation with priority 600 to prevent lights from blinking during boot
#     Turns off both lights immediately after ESP boot to avoid brief flash on power-on

packages:
  # higher in the list is higher priority (can overwrite values from includes below)
  common: !include pavolholes_common/common.yaml
  esp32: !include pavolholes_common/esp32.yaml
  # debug: !include pavolholes_common/debug.yaml
  # web_server: !include pavolholes_common/web_server.yaml # if ESP32 Bluetooth is used this needs to be disabled
  esp32BluetoothProxy: !include pavolholes_common/esp32BluetoothProxy.yaml # including this changes the framework so the first time it have to be loaded to ESP using USB cable, not OTA!
  gpio_button: !include pavolholes_common/binary_sensor/gpio_button.yaml

output:
  - platform: ledc
    id: output_pwm
    pin: ${pwm_pin}

  - platform: ledc
    id: output_pwm2
    pin: ${pwm_pin2}

light:
  - platform: monochromatic
    name: "${friendly_name} Hlavne"
    icon: mdi:lightbulb
    id: light_pwm
    output: output_pwm
    restore_mode: ALWAYS_OFF #RESTORE_DEFAULT_OFF
    gamma_correct: 1.0 # to start brightness at 0.01 not at 0.18

  - platform: monochromatic
    name: "${friendly_name} LED"
    icon: mdi:led-strip-variant
    id: light_pwm2
    output: output_pwm2
    restore_mode: ALWAYS_OFF #RESTORE_DEFAULT_OFF
    gamma_correct: 1.0 # to start brightness at 0.01 not at 0.18

on_boot:
  - priority: 600
    then:
      - light.turn_off: light_pwm
      - light.turn_off: light_pwm2
