# CHANGES
# 0.2 2024-05-12
#   - [light] > [LED] > [restore_mode] > Changed from [ALWAYS_OFF] to [RESTORE_DEFAULT_OFF]

substitutions:
  device_name: obyvacka-akvarium
  friendly_name: Obyvacka Akvarium
  room: Obyvacka
  project_name: pavolholes.${friendly_name}
  project_version: "0.2"
  device_type: ESP32 WROOM

  # i2c_sda: GPIO21
  # i2c_scl: GPIO22

  pwm_pin1: GPIO16
  pwm_pin2: GPIO17
  pwm_pin3: GPIO18
  pwm_pin4: GPIO19
  
  ds18b20_1wire_pin: GPIO15
  
  liquid_contactless_sensor_pin: GPIO27
  liquid_contactless_sensor_pullup: INPUT_PULLUP
  liquid_contactless_sensor_inverted: "True"

packages:
  # higher in the list is higher priority (can overwrite values from includes below)
  common: !include pavolholes_common/common.yaml
  esp32: !include pavolholes_common/esp32.yaml
  # debug: !include pavolholes_common/debug.yaml
  # web_server: !include pavolholes_common/web_server.yaml # if ESP32 Bluetooth is used this needs to be disabled
  # esp32BluetoothProxy: !include pavolholes_common/esp32BluetoothProxy.yaml # including this changes the framework so the first time it have to be loaded to ESP using USB cable, not OTA!
  # bme280: !include pavolholes_common/sensor/bme280.yaml
  # ikeaVindriktning: !include pavolholes_common/sensor/ikea_vindriktning.yaml
  # ld2410: !include pavolholes_common/sensor/ld2410.yaml
  ds18b20: !include pavolholes_common/sensor/dallas-ds18b20.yaml
  liquid_contactless_sensor: !include pavolholes_common/sensor/liquid_contactless_sensor.yaml

output:
  - platform: ledc
    id: output_pwm1
    pin: ${pwm_pin1}
    frequency: 300Hz
    # max_power: 80% # for color calibration

  - platform: ledc
    id: output_pwm2
    pin: ${pwm_pin2}
    frequency: 300Hz
    # max_power: 80% # for color calibration

  - platform: ledc
    id: output_pwm3
    pin: ${pwm_pin3}
    frequency: 300Hz
    # max_power: 80% # for color calibration

  - platform: ledc
    id: output_pwm4
    pin: ${pwm_pin4}
    frequency: 300Hz
    # max_power: 80% # for color calibration

light:
  - platform: rgbw
    name: LED
    icon: mdi:led-strip-variant
    red: output_pwm1
    green: output_pwm2
    blue: output_pwm3
    white: output_pwm4
    restore_mode: RESTORE_DEFAULT_OFF #ALWAYS_OFF
    gamma_correct: 1.0 # to start brightness at 0.01 not at 0.18

