substitutions:
  common_deviceSpecific_comment: "shelly2_5 v0.3"
  devicename: shelly_25

# CHANGES
# v0.3
#   - "platform: ade7953" changed to "platform: ade7953_i2c" because it was renamed in ESPHome
# v0.2
#   - ?
# v0.1
#   - initial version 

esphome:
  platform: ESP8266
  board: esp01_1m

wifi:
  power_save_mode: HIGH # for ESP8266 LOW/HIGH are mixed up, esphome/issues/issues/1532

i2c:
  sda: GPIO12
  scl: GPIO14
  
sensor:
  - platform: ade7953_i2c
    irq_pin: GPIO16 # Prevent overheating by setting this
    voltage:
      name: Voltage
    # On the Shelly 2.5 channels are mixed ch1=B ch2=A
    current_a:
      name: ${channel2_name} Current
      internal: true
    current_b:
      name: ${channel1_name} Current
      internal: true
    active_power_a:
      name: ${channel2_name} Power
      id: power_channel_2
      # active_power_a is normal, so don't multiply by -1
      on_value_range:
        - above: ${max_power}
          then:
            - switch.turn_off: shelly_relay_2
            - homeassistant.service:
                service: persistent_notification.create
                data:
                  title: Message from ${friendly_name}
                data_template:
                  message: ${channel2_name} turned off because power exceeded ${max_power}W!
            - homeassistant.service:
                service: notify.mobile_app_iphonepavol
                data:
                  title: ${friendly_name}
                  message: ⚠️${channel2_name} vypnuté, pretože bol prekročený max. výkon ${max_power}W!
    active_power_b:
      name: ${channel1_name} Power
      id: power_channel_1
      # active_power_b is inverted, so take the absolute value
      filters:
        - lambda: return abs(x);
      on_value_range:
        - above: ${max_power}
          then:
            - switch.turn_off: shelly_relay_1
            - homeassistant.service:
                service: persistent_notification.create
                data:
                  title: Message from ${friendly_name}
                data_template:
                  message: ${channel1_name} turned off because power exceeded ${max_power}W!
            - homeassistant.service:
                service: notify.mobile_app_iphonepavol
                data:
                  title: ${friendly_name}
                  message: ⚠️${channel1_name} vypnuté, pretože bol prekročený max. výkon ${max_power}W!
    update_interval: 30s

  - platform: total_daily_energy
    name: ${channel1_name} Energy
    power_id: power_channel_1
    filters:
      # Multiplication factor from W to kWh is 0.001
      - multiply: 0.001
    unit_of_measurement: kWh

  - platform: total_daily_energy
    name: ${channel2_name} Energy
    power_id: power_channel_2
    filters:
      # Multiplication factor from W to kWh is 0.001
      - multiply: 0.001
    unit_of_measurement: kWh

  # NTC Temperature
  - platform: ntc
    sensor: temp_resistance_reading
    name: Device Temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    calibration:
      b_constant: 3350
      reference_resistance: 10kOhm
      reference_temperature: 25°C
      # reference_temperature: 298.15K
    on_value_range:
      - above: ${max_temp}
        then:
          - if:
              condition:
                or:
                  - switch.is_on: shelly_relay_1
                  - switch.is_on: shelly_relay_2
              then:
                - switch.turn_off: shelly_relay_1
                - switch.turn_off: shelly_relay_2
                - homeassistant.service:
                    service: persistent_notification.create
                    data:
                      title: Message from ${friendly_name}
                    data_template:
                      message: Device turned off because temperature exceeded ${max_temp}°C!
                - homeassistant.service:
                    service: notify.mobile_app_iphonepavol
                    data:
                      title: ${friendly_name}
                      message: ⚠️Celé zariadenie ${friendly_name} sa vyplo, pretože bola prekročená max. teplota zariadenia ${max_temp}°C!

  - platform: resistance
    id: temp_resistance_reading
    sensor: temp_analog_reading
    configuration: DOWNSTREAM
    resistor: 32kOhm
    internal: true

  - platform: adc
    id: temp_analog_reading
    pin: A0
    update_interval: 1s
    internal: true

status_led:
  pin:
    number: GPIO0
    inverted: True
    ignore_strapping_warning: True

switch:
  - platform: gpio
    id: shelly_relay_1
    name: ${channel1_name}
    pin: GPIO4
    icon: "mdi:electric-switch"
    restore_mode: RESTORE_DEFAULT_OFF
    # Ensure only one switch at a time is on (https://esphome.io/components/switch/gpio.html#interlocking)
    # interlock: &interlock_group [shelly_relay_1, shelly_relay_2]

  - platform: gpio
    id: shelly_relay_2
    name: ${channel2_name}
    pin: GPIO15
    icon: "mdi:electric-switch"
    restore_mode: RESTORE_DEFAULT_OFF
    # interlock: *interlock_group

binary_sensor:
  - platform: gpio
    name: ${channel1_name} Button
    pin:
      number: GPIO13
    internal: True
    filters:
      - delayed_on_off: 30ms
    on_press:
      then:
        - switch.toggle: shelly_relay_1
  - platform: gpio
    name: ${channel2_name} Button
    pin:
      number: GPIO5
    internal: True
    filters:
      - delayed_on_off: 30ms
    on_press:
      then:
        - switch.toggle: shelly_relay_2