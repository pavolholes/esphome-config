substitutions:
  comment_shelly_dimmer: "shellyDimmer1and2 v0.6"
  light_nightBrightnessLevel: "0.01"
  light_eveningBrightnessLevel: "0.20"
  light_fadingStep: "0.05"
  light_min_brightness: "200"

# CHANGES
# v0.6 2026-04-23
#   - renamed substitution from common_deviceSpecific_comment to comment_shelly_dimmer
# v0.5 2025-04-18
#   - changed [esphome] > [platform: ESP8266] and [board: modwifi] to [esp8266] > [board: modwifi]
# v0.4 Pavol 2025-01-03
#   - [status_led > pin > ignore_strapping_warning] commented because it's not valid
# v0.3
#   - commented the external_components section because the Shelly Dimmer has now official support in the main ESPHOme code 
# v0.2
#   - ?
# v0.1
#   - initial version 

esp8266:
  board: modwifi

logger:
  baud_rate: 0 # disable logging to serial console because serial port (UART) is used to communicate with dimmer module
  # uncoment below line (level: VERBOSE) for debugging the button timing - it enables global VERBOSE logging but all other chatty modules are kept as INFO
  # level: VERBOSE
  logs:
    shelly_dimmer: ERROR
    json: INFO
    sensor: INFO
    adc: INFO
    ntc: INFO
    resistance: INFO
    text_sensor: INFO

uart:
    tx_pin: 1
    rx_pin: 3
    baud_rate: 115200

# external_components:
#   - source:
#       type: git
#       url: https://github.com/rnauber/esphome.git
#       ref: feature/shelly-dimmer
#     refresh: 1min
#     components: [ shelly_dimmer ]

status_led:
  pin:
    number: GPIO2 #D4 #BUILTIN_LED
    inverted: True
    # ignore_strapping_warning: True

sensor:
  # NTC Temperature
  - platform: ntc
    sensor: temp_resistance_reading
    name: Device Temperature
    unit_of_measurement: °C
    accuracy_decimals: 1
    icon: mdi:thermometer
    calibration:
      b_constant: 3350
      reference_resistance: 10kOhm
      reference_temperature: 25°C
      #reference_temperature: 298.15K
    on_value_range:
      - above: ${max_temp}
        then:
          - light.turn_off:
              id: light_dimmer
          - logger.log:
              format: "Light turned off because temperature exceeded ${max_temp}°C!"
              level: ERROR
          - homeassistant.service:
              service: persistent_notification.create
              data:
                title: Message from ${friendly_name}
              data_template:
                message: Light turned off because temperature exceeded ${max_temp}°C!
          - homeassistant.service:
              service: notify.mobile_app_iphonepavol
              data:
                title: ${friendly_name}
                message: ⚠️${friendly_name} vypnuté pretože bola prekročená max. teplota zariadenia ${max_temp}°C!

  - platform: resistance
    id: temp_resistance_reading
    sensor: temp_analog_reading
    configuration: DOWNSTREAM
    resistor: 32kOhm
    internal: true

  - platform: adc
    id: temp_analog_reading
    name: ADC
    pin: A0
    update_interval: 1s
    internal: true

  - platform: total_daily_energy
    name: Energy
    power_id: dimmer_power
    filters:
      # Multiplication factor from W to kW is 0.001
      - multiply: 0.001
    unit_of_measurement: kWh

light:
  - platform: shelly_dimmer
    name: Hlavne
    id: light_dimmer
    icon: mdi:globe-light-outline
    restore_mode: RESTORE_DEFAULT_OFF
    leading_edge: false
    min_brightness: ${light_min_brightness}
    max_brightness: 1000
    # warmup_brightness: 100
    # warmup_time: 20
    # gamma_correct: 1
    default_transition_length: 1s
    power:
      name: Power
      id: dimmer_power
      on_value_range: 
        above: ${max_power}
        then:
          - light.turn_off:
              id: light_dimmer
          - logger.log:
              format: "Light turned off because power exceeded ${max_power}W!"
              level: ERROR
          - homeassistant.service:
              service: persistent_notification.create
              data:
                title: Message from ${friendly_name}
              data_template:
                message: Light turned off because power exceeded ${max_power}W!    
          - homeassistant.service:
              service: notify.mobile_app_iphonepavol
              data:
                title: ${friendly_name}
                message: ⚠️${friendly_name} vypnuté pretože bol prekročený max. výkon ${max_power}W!    
    voltage:
      name: Voltage
    current:
      name: Current
    firmware:
      version: "51.6"
      update: true

binary_sensor:
  # Create gpio binary_sensor (input) for button connected to pin.
  - platform: gpio
    id: wall_button
    name: Light Wall Button
    device_class: light
    internal: True
    pin:
      number: ${button_pin}
      # Pullup means it's switching ground (that's why it's inverted as well).
      # mode: INPUT_PULLUP
      # inverted: True
    filters:
      # - delayed_on: 50ms
      - delayed_on_off: 30ms
      # - invert:
    on_multi_click: !include { file: binary_sensor/gpio_button_multiclick.yaml, vars: { light_id: light_dimmer } }
