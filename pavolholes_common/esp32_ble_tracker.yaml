  #         }

sensor:
  - platform: ble_rssi
    id: sensor_ble_rssi_${ble_tracker_name}
    mac_address: ${ble_tracker_MAC}
    # ibeacon_uuid: ${ble_tracker_UUID}
    # service_uuid: ${ble_tracker_UUID}
    name: ${ble_tracker_friendly_name} RSSI
    filters:
      - exponential_moving_average:
          alpha: 0.3
          send_every: 1
    on_value:
      then:
        - lambda: |-
            if (id(sensor_ble_rssi_$ble_tracker_name).state > id(select_rssi_present_$ble_tracker_name).state) {
              id(sensor_room_presence_debounce_$ble_tracker_name).publish_state(1);
            } else if (id(sensor_ble_rssi_$ble_tracker_name).state < id(select_rssi_not_present_$ble_tracker_name).state) {
              id(sensor_room_presence_debounce_$ble_tracker_name).publish_state(0);
            }
        - script.execute: script_presence_timeout_${ble_tracker_name}  # Publish 0 if no rssi received

  - platform: template
    id: sensor_room_presence_debounce_${ble_tracker_name}
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

number:
  # Anything stronger than the value in 'select_rssi_present' is considered present. 
  - platform: template
    id: select_rssi_present_${ble_tracker_name}
    name: ${ble_tracker_friendly_name} BLE RSSI Present
    optimistic: true
    mode: box
    min_value: -100
    max_value: -40
    step: 1
    restore_value: yes
    initial_value: -77
    unit_of_measurement: dBm
    entity_category: config

  # Anything below the value of 'select_rssi_not_present' means definitely not present.
  - platform: template
    id: select_rssi_not_present_${ble_tracker_name}
    name: ${ble_tracker_friendly_name} BLE RSSI Not Present
    optimistic: true
    mode: box
    min_value: -100
    max_value: -40
    step: 1
    restore_value: yes
    initial_value: -90
    unit_of_measurement: dBm
    entity_category: config

binary_sensor:
  - platform: template
    id: room_presence_${ble_tracker_name}
    name: ${ble_tracker_friendly_name} presence
    device_class: occupancy
    lambda: |-
      if (id(sensor_room_presence_debounce_$ble_tracker_name).state > 0.99) {
        return true;
      } else if (id(sensor_room_presence_debounce_$ble_tracker_name).state < 0.01) {
        return false;
      } else {
        return id(room_presence_$ble_tracker_name).state;
      }

script:
  # Publish event every 30 seconds when no rssi received
  - id: script_presence_timeout_${ble_tracker_name}
    mode: restart
    then:
      - delay: 30s
      - lambda: |-
          id(sensor_room_presence_debounce_$ble_tracker_name).publish_state(0);
      - script.execute: script_presence_timeout_${ble_tracker_name}