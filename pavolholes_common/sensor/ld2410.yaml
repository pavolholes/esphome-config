substitutions:
  comment_ld2410: "ld2410 v0.4.6"
  uart_ld2410_tx: RX # TX on LD2410 and RX on ESP
  uart_ld2410_rx: TX # RX on LD2410 and TX on ESP

# CHANGES
# v0.4.6 Pavol Holes 2026-04-27
#   - [binary_sensor > ld2410_presence_custom > on_state] added detailed gate information to change_reason
#     Now shows which specific gates triggered the change with their energy values
#     Format: "Move: [g1(23) g4(8)] Still: [g4(12) g5(21) g6(14)]"
#   - [binary_sensor > ld2410_presence_custom > lambda] implemented hysteresis logic
#     ACTIVATION: Requires 1 move gate AND 3 still gates (prevents false positives)
#     MAINTENANCE: Requires only 3 still gates (enables static detection)
#     This prevents false positives at night while allowing persistent detection when sitting still
# v0.3.5 Pavol Holes 2026-04-23
#   - renamed substitution from common_deviceSpecific_comment to comment_ld2410
# v0.3.5 Pavol Holes 2026-04-22
#   - [interval] added interval to enable Engineering Mode after startup (every 10s if off)
#     This ensures gate energies are always available for custom sensor without modifying LD2410 source code
#     Engineering Mode is required for gate energies to be available (g0-g8 move/still energies)
#     Without this, Engineering Mode would be disabled after power cycle/restart
#   - [binary_sensor > ld2410_presence_custom] renamed from ld2410_presence_custom_gates to ld2410_presence_custom
#     This consolidates the gate-based filtering logic into the main custom sensor
#   - [binary_sensor > ld2410_presence_custom] deleted old version (based on internal still_target + still_energy)
#     The gate-based filtering (1 move gate + 2 still gates) is now the standard approach
# v0.3.4 Pavol Holes 2026-04-21
#   - [binary_sensor > ld2410_presence_custom_gates > lambda] modified to require at least 1 move gate (g1-g8) AND 2 still gates (g2-g8)
#     This prevents false positives from still-only triggers (hardware noise) while still detecting legitimate movement
#     Previous version required only 2 gates total, which allowed false positives from still gates alone
# v0.3.3 Pavol Holes 2026-04-20
#   - [binary_sensor > ld2410_presence_custom_gates] added new gate-based presence sensor
#     Uses direct gate energy/threshold comparison instead of internal LD2410 targets
#     Requires at least 2 gates to exceed thresholds simultaneously to filter erratic spikes
#     Skips g0 for move detection and g0-g1 for still detection (most prone to hardware noise)
#   - [sensor > ld2410 > g0-g8 > move/still_energy] added explicit IDs for gate energy sensors
#   - [number > ld2410 > g0-g8 > move/still_threshold] added explicit IDs for gate threshold numbers
# v0.3.2 Pavol Holes 2026-04-19
#   - [binary_sensor > ld2410_presence_custom > lambda] modified to require BOTH internal still_target AND still_energy > threshold for still detection
#     This prevents false positives when still_energy is at maximum (100) but internal still_target is OFF (filtered by gates)
#   - [binary_sensor > ld2410_still_target_custom > lambda] modified to match presence_custom logic for consistency
#     Now requires BOTH internal still_target AND still_energy > threshold instead of just still_energy > threshold
# v0.3.1 Pavol Holes 2025-05-27
#   - [button > template > calibrate_ld2410] fixed logging
# v0.3.0 Pavol Holes 2025-05-14
#   - [button > template > calibrate_ld2410] added
# v0.2 Pavol Holes 2024-03-23
#   - [sensor > ld2410 > light] commented because I don't have use for it
#   - [binary_sensor > ld2410] commented because all is replaced with custom template sensors
#   - [binary_sensor > ld2410_still_target_custom > id] changed from [presence_still_custom] to [ld2410_still_target_custom] and replace all occurence in the code where it was used
#   - [binary_sensor > ld2410_still_target_custom > name] changed from [LD2410 Presence Still Custom] to [LD2410 Still Target Custom]
#   - [binary_sensor > ld2410_still_target_custom] added [icon: mdi:motion-sensor]
#   - [binary_sensor > ld2410_presence_custom > id] changed from [ld2410_presence] to [ld2410_presence_custom]  and replace all occurence in the code where it was used
#   - [binary_sensor > ld2410_presence_custom] added [icon: mdi:account]
#   - [number > ld2410 > light_threshold] commented because I don't have use for it
#   - [select > ld2410 > light_function] commented because I don't have use for it
#   - [select > ld2410 > out_pin_level] commented because I don't have use for it
#   - [text_sensor > ld2410 > version] added [disabled_by_default: true]
#   - [text_sensor > ld2410 > mac_address] added [disabled_by_default: true]
#   - [number > number_still_target_delayed_off > id] from [number_presence_still_delayed_off] to [number_still_target_delayed_off]
#   - [number > number_still_target_delayed_off > name] changed from [LD2410 Presence Still Delayed Off Seconds] to [LD2410 Still Target Delayed Off Seconds]
#   - [number > number_still_target_delayed_off > mode] commented to use default value [auto]
#   - [number > number_still_target_delayed_on > id] from [number_presence_still_delayed_on] to [number_still_target_delayed_on]
#   - [number > number_still_target_delayed_on > name] changed from [LD2410 Presence Still Delayed On Seconds] to [LD2410 Still Target Delayed On Seconds]
#   - [number > number_still_target_delayed_on > mode] commented to use default value [auto]
#   - [number > number_still_energy_threshold > id] from [number_presence_custom_still_energy_threshold] to [number_still_energy_threshold]
#   - [number > number_still_energy_threshold > name] from [LD2410 Presence Custom Still Energy Threshold] to [LD2410 Still Energy Threshold]
#   - [number > number_still_energy_threshold > mode] commented to use default value [auto]
#   - [number > number_move_energy_threshold > id] from [number_presence_custom_move_energy_threshold] to [number_move_energy_threshold]
#   - [number > number_move_energy_threshold > name] from [LD2410 Presence Custom Move Energy Threshold] to [LD2410 Move Energy Threshold]
#   - [number > number_move_energy_threshold > mode] commented to use default value [auto]
#   - [number > number_presence_delayed_on > mode] commented to use default value [auto]
#   - [number > number_presence_delayed_off > mode] commented to use default value [auto]
#   - [text_sensor > ld2410_presence_custom_change_reason] new text sensor to keep value the reason why the Presence Custom was changed
#   - [binary_sensor > ld2410_presence_custom > on_state] moved text from log to variable and log from variable but also publish to the [text_sensor > ld2410_presence_custom_change_reason]
#
# v0.1 Pavol Holes 2024-01-29
#   - initial version 

# DOCUMENTATION
# https://esphome.io/components/sensor/ld2410.html
# https://esphome.io/components/uart#uart

uart:
  - id: uart_ld2410
    tx_pin: ${uart_ld2410_tx}
    rx_pin: ${uart_ld2410_rx}
    baud_rate: 256000
    parity: "NONE"
    stop_bits: 1
    # debug:
    #   direction: BOTH
    #   dummy_receiver: false
    #   sequence:
    #     - lambda: UARTDebug::log_string(direction, bytes);

ld2410:
  uart_id: uart_ld2410

switch:
  - platform: ld2410
    engineering_mode:
      id: switch_ld2410_engineering_mode
      name: LD2410 Engineering Mode
    bluetooth:
      name: LD2410 Control Bluetooth

# Interval to enable Engineering Mode after startup
# This ensures gate energies are always available for custom sensor
# Engineering Mode is required for gate energies (g0-g8 move/still energies) to be available
interval:
  - interval: 10s
    then:
      - if:
          condition:
            switch.is_off: switch_ld2410_engineering_mode
          then:
            - switch.turn_on: switch_ld2410_engineering_mode
            - logger.log:
                tag: "ld2410"
                level: "INFO"
                format: "Engineering Mode enabled on boot for gate energy availability"

binary_sensor:
  - platform: ld2410
    has_target:
      name: LD2410 Presence
      filters:
        # delayed_on prevents false positives when background noise spikes randomly
        # template in miliseconds so we need to multiple with 1000
        - delayed_on: !lambda |-
            return id(number_presence_delayed_on).state * 1000.0;
        # delayed_off prevents false negatives
        # template in miliseconds so we need to multiple with 1000
        - delayed_off: !lambda |-
            return id(number_presence_delayed_off).state * 1000.0;
    has_moving_target:
      name: LD2410 Moving Target
      id: ld2410_moving_target
    has_still_target:
      name: LD2410 Still Target
      id: ld2410_still_target
      filters:
        # delayed_on prevents false positives when background noise spikes randomly
        # template in miliseconds so we need to multiple with 1000
        - delayed_on: !lambda |-
            return id(number_still_target_delayed_on).state * 1000.0;
        # delayed_off prevents false negatives
        # template in miliseconds so we need to multiple with 1000
        - delayed_off: !lambda |-
            return id(number_still_target_delayed_off).state * 1000.0;
  #   out_pin_presence_status:
  #     name: LD2410 Out PIN Presence Status

  - platform: template
    id: ld2410_still_target_custom
    name: LD2410 Still Target Custom
    icon: mdi:motion-sensor
    device_class: occupancy
    # update_interval: 10s
    on_state: 
      then:
        - lambda: |-
            ESP_LOGI("ld2410", "[LD2410 Still Target Custom] Presence changed to [%s]. Still energy: [%.0f]. Thresold: [%.0f]", id(ld2410_still_target).state ? "ON" : "OFF", id(ld2410_still_energy).state, id(number_still_energy_threshold).state);
    lambda: |-
      // Combined technique: Require BOTH internal still_target AND still_energy > threshold
      // This prevents false positives when still_energy is 100 but internal still_target is OFF (filtered by gates)
      if (id(ld2410_still_target).state && (id(ld2410_still_energy).state > id(number_still_energy_threshold).state)) {
        return true;
      } else {
        return false;
      }
    filters:
      # delayed_on prevents false positives when background noise spikes randomly
      # template in miliseconds so we need to multiple with 1000
      - delayed_on: !lambda |-
          return id(number_still_target_delayed_on).state * 1000.0;
      # delayed_off prevents false negatives
      # template in miliseconds so we need to multiple with 1000
      - delayed_off: !lambda |-
          return id(number_still_target_delayed_off).state * 1000.0;

  - platform: template
    id: ld2410_presence_custom
    name: LD2410 Presence Custom
    icon: mdi:account-multiple
    device_class: occupancy
    # update_interval: 10s
    on_state:
      then:
        - lambda: |-
            std::string vText = "Gates Presence changed to [" + std::string(id(ld2410_presence_custom).state ? "ON" : "OFF") + "]. ";
            
            // Add gate details
            std::string move_gates_str = "";
            if (id(ld2410_g1_move_energy).state > id(number_ld2410_g1_move_threshold).state) move_gates_str += "g1(" + to_string((int)id(ld2410_g1_move_energy).state) + ") ";
            if (id(ld2410_g2_move_energy).state > id(number_ld2410_g2_move_threshold).state) move_gates_str += "g2(" + to_string((int)id(ld2410_g2_move_energy).state) + ") ";
            if (id(ld2410_g3_move_energy).state > id(number_ld2410_g3_move_threshold).state) move_gates_str += "g3(" + to_string((int)id(ld2410_g3_move_energy).state) + ") ";
            if (id(ld2410_g4_move_energy).state > id(number_ld2410_g4_move_threshold).state) move_gates_str += "g4(" + to_string((int)id(ld2410_g4_move_energy).state) + ") ";
            if (id(ld2410_g5_move_energy).state > id(number_ld2410_g5_move_threshold).state) move_gates_str += "g5(" + to_string((int)id(ld2410_g5_move_energy).state) + ") ";
            if (id(ld2410_g6_move_energy).state > id(number_ld2410_g6_move_threshold).state) move_gates_str += "g6(" + to_string((int)id(ld2410_g6_move_energy).state) + ") ";
            if (id(ld2410_g7_move_energy).state > id(number_ld2410_g7_move_threshold).state) move_gates_str += "g7(" + to_string((int)id(ld2410_g7_move_energy).state) + ") ";
            if (id(ld2410_g8_move_energy).state > id(number_ld2410_g8_move_threshold).state) move_gates_str += "g8(" + to_string((int)id(ld2410_g8_move_energy).state) + ") ";
            
            std::string still_gates_str = "";
            if (id(ld2410_g2_still_energy).state > id(number_ld2410_g2_still_threshold).state) still_gates_str += "g2(" + to_string((int)id(ld2410_g2_still_energy).state) + ") ";
            if (id(ld2410_g3_still_energy).state > id(number_ld2410_g3_still_threshold).state) still_gates_str += "g3(" + to_string((int)id(ld2410_g3_still_energy).state) + ") ";
            if (id(ld2410_g4_still_energy).state > id(number_ld2410_g4_still_threshold).state) still_gates_str += "g4(" + to_string((int)id(ld2410_g4_still_energy).state) + ") ";
            if (id(ld2410_g5_still_energy).state > id(number_ld2410_g5_still_threshold).state) still_gates_str += "g5(" + to_string((int)id(ld2410_g5_still_energy).state) + ") ";
            if (id(ld2410_g6_still_energy).state > id(number_ld2410_g6_still_threshold).state) still_gates_str += "g6(" + to_string((int)id(ld2410_g6_still_energy).state) + ") ";
            if (id(ld2410_g7_still_energy).state > id(number_ld2410_g7_still_threshold).state) still_gates_str += "g7(" + to_string((int)id(ld2410_g7_still_energy).state) + ") ";
            if (id(ld2410_g8_still_energy).state > id(number_ld2410_g8_still_threshold).state) still_gates_str += "g8(" + to_string((int)id(ld2410_g8_still_energy).state) + ") ";
            
            vText += "Move: [" + move_gates_str + "] Still: [" + still_gates_str + "]";
            
            ESP_LOGI("ld2410", "[LD2410 Presence Custom] %s", vText.c_str());
            id(ld2410_presence_custom_change_reason).publish_state(vText);
    lambda: |-
      // Hysteresis logic: Different thresholds for activation vs maintenance
      // ACTIVATION: Requires 1 move gate AND 3 still gates (prevents false positives)
      // MAINTENANCE: Requires only 3 still gates (enables static detection)
      static bool presence_active = false;
      
      int move_gates_above_threshold = 0;
      int still_gates_above_threshold = 0;
      
      // Check move gates (g1-g8, skip g0 as it's most prone to noise)
      if (id(ld2410_g1_move_energy).state > id(number_ld2410_g1_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g2_move_energy).state > id(number_ld2410_g2_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g3_move_energy).state > id(number_ld2410_g3_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g4_move_energy).state > id(number_ld2410_g4_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g5_move_energy).state > id(number_ld2410_g5_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g6_move_energy).state > id(number_ld2410_g6_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g7_move_energy).state > id(number_ld2410_g7_move_threshold).state) move_gates_above_threshold++;
      if (id(ld2410_g8_move_energy).state > id(number_ld2410_g8_move_threshold).state) move_gates_above_threshold++;
      
      // Check still gates (g2-g8, skip g0-g1 as they're closest to sensor and prone to noise)
      if (id(ld2410_g2_still_energy).state > id(number_ld2410_g2_still_threshold).state) still_gates_above_threshold++;
      if (id(ld2410_g3_still_energy).state > id(number_ld2410_g3_still_threshold).state) still_gates_above_threshold++;
      if (id(ld2410_g4_still_energy).state > id(number_ld2410_g4_still_threshold).state) still_gates_above_threshold++;
      if (id(ld2410_g5_still_energy).state > id(number_ld2410_g5_still_threshold).state) still_gates_above_threshold++;
      if (id(ld2410_g6_still_energy).state > id(number_ld2410_g6_still_threshold).state) still_gates_above_threshold++;
      if (id(ld2410_g7_still_energy).state > id(number_ld2410_g7_still_threshold).state) still_gates_above_threshold++;
      if (id(ld2410_g8_still_energy).state > id(number_ld2410_g8_still_threshold).state) still_gates_above_threshold++;
      
      // Activation: 1 move AND 3 still gates
      bool should_activate = (move_gates_above_threshold >= 1 && still_gates_above_threshold >= 3);
      // Maintenance: 3 still gates only
      bool should_maintain = (still_gates_above_threshold >= 3);
      
      if (should_activate) {
        presence_active = true;
      } else if (!should_maintain) {
        presence_active = false;
      }
      
      return presence_active;
    filters:
      - delayed_on: !lambda |-
          return id(number_presence_delayed_on).state * 1000.0;
      - delayed_off: !lambda |-
          return id(number_presence_delayed_off).state * 1000.0;

