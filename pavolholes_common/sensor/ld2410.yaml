    name: LD2410 Auto-calibration
    id: calibrate_ld2410
    entity_category: config
    on_press:
      then:
        # 1. Enable Configuration Mode
        - lambda: |-
            ESP_LOGI("ld2410", "[LD2410 Auto-calibration] Starting LD2410 calibration sequence... You have 10 seconds to clear the room!");
            ESP_LOGD("ld2410", "[LD2410 Auto-calibration] Sending Enable Configuration command (0x00FF)");
        - uart.write:
            id: uart_ld2410
            # Data: HDR | LEN=4 | CMD=0xFF | VAL=0x01 | FTR
            data: [0xFD, 0xFC, 0xFB, 0xFA, 0x04, 0x00, 0xFF, 0x00, 0x01, 0x00, 0x04, 0x03, 0x02, 0x01]
        - delay: 1000ms

        # 2. Start the auto-calibration
        - lambda: |-
            ESP_LOGD("ld2410", "[LD2410 Auto-calibration] Sending Start Calibration command (0x000B, 60s)");
        - uart.write:
            id: uart_ld2410
            # Data: HDR | LEN=4 | CMD=0x0B | VAL=0x3C00 | FTR
            data: [0xFD, 0xFC, 0xFB, 0xFA, 0x04, 0x00, 0x0B, 0x00, 0x3C, 0x00, 0x04, 0x03, 0x02, 0x01]
        - delay: 1000ms

        # 3. Disable Configuration Mode
        - lambda: |-
            ESP_LOGD("ld2410", "[LD2410 Auto-calibration] Sending End Configuration command (0x00FE)");
        - uart.write:
            id: uart_ld2410
            # Data: HDR | LEN=2 | CMD=0xFE | FTR (No value needed)
            data: [0xFD, 0xFC, 0xFB, 0xFA, 0x02, 0x00, 0xFE, 0x00, 0x04, 0x03, 0x02, 0x01]
        - lambda: |-
            ESP_LOGI("ld2410", "[LD2410 Auto-calibration] LD2410 calibration sequence sent. Ensure room is empty for 70 seconds!");

        - delay: 70000ms
        - lambda: |-
            ESP_LOGI("ld2410", "[LD2410 Auto-calibration] LD2410 calibration finished. Force a query to download new parameters.");


