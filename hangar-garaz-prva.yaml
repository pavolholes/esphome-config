# CHANGES
# 0.1 2026-04-15
#   - initial version

substitutions:
  device_name: hangar-garaz-prva
  friendly_name: Hangar Garaz Prva
  room: Hangar
  project_name: pavolholes.${friendly_name}
  project_version: "0.1"
  device_type: ESP32-C3-super-mini
  
  button_pin: GPIO1
  button_pullup: INPUT_PULLUP
  button_inverted: "True"
  
  # garaz ovladanie config
  garaz_ovladanie_open_duration: 13s
  garaz_ovladanie_close_duration: 19s
  garaz_ovladanie_relay_pin_auto: GPIO10 # gpio pin that trigger the door opening/closing/stop
  garaz_ovladanie_close_endstop_pin: GPIO20 # gpio pin for close reed switch
  garaz_ovladanie_open_endstop_pin: GPIO21 # gpio pin for close reed switch

packages:
  # higher in the list is higher priority (can overwrite values from includes below)
  common: !include pavolholes_common/common.yaml
  # debug: !include pavolholes_common/debug.yaml
  # web_server: !include pavolholes_common/web_server.yaml # if ESP32 Bluetooth is used this needs to be disabled
  # esp32: !include pavolholes_common/esp32.yaml
  esp32-c3-super-mini: !include pavolholes_common/esp32-c3-super-mini.yaml
  garaz-ovladanie: !include pavolholes_common/garaz-ovladanie.yaml
  esp32BluetoothProxy: !include pavolholes_common/esp32BluetoothProxy.yaml # including this changes the framework so the first time it have to be loaded to ESP using USB cable, not OTA!

binary_sensor:
  - platform: gpio
    id: wall_button
    # name: Garaz Prva Tlacidlo
    # icon: mdi:garage-lock
    # device_class: garage_door
    internal: True
    pin:
      number: ${button_pin}
      # Pullup means it's switching ground (that's why it's inverted as well).
      mode: ${button_pullup}
      inverted: ${button_inverted}
    filters:
      # - delayed_on: 50ms
      - delayed_on_off: 30ms
      # - invert:
    on_press: 
      then:
        - cover.toggle: garaz_cover
